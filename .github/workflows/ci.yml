name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: duro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        env:
          DURO_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/duro_test?sslmode=disable
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1
